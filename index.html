<!DOCTYPE html>
<html>
<head>
  <title>WHFLOW Sedap Kitchen</title>
</head>
<body>
  <iframe 
    src="https://script.google.com/a/~macros/s/AKfycbzq5Fc-hmow85pQ4q8wkZZ6UmNBBLLhKql5vD2J5XaAqpSHimpYbrL6pqJ_Jr1vh8MkKw/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
      document.querySelector('iframe')
        .requestFullscreen()
        .catch((err) => {
          console.error('Error attempting to enable full-screen mode:', err.message);
        });
    };
  </script>
</body>
</html>
